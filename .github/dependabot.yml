version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - security
      - documentation

  - package-ecosystem: pip
    directory: /tools/verifiable_document
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - security
