name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Python 3.11 quality gates
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            workspace-template/requirements.txt
            tools/verifiable_document/requirements.txt

      - name: Install test dependencies
        run: |
          python -m pip install --disable-pip-version-check "ruff>=0.11,<1" "pytest>=8,<10"
          python -m pip install --disable-pip-version-check -r workspace-template/requirements.txt

      - name: Set reproducible timestamp
        run: echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)" >> "$GITHUB_ENV"

      - name: Lint
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

      - name: Validate public upstream
        run: python3 scripts/validate_workspace.py --mode upstream

      - name: Scan public repository
        run: python3 scripts/check_repo_safety.py --profile upstream-public

      - name: Run workspace unit tests
        run: python3 -m unittest discover -s tests -v

      - name: Run document-tool unit tests
        run: python3 -m unittest discover -s tools/verifiable_document/tests -v

      - name: Run pytest
        run: python3 -m pytest

      - name: Build release workspace
        run: python3 scripts/build_release.py

      - name: Verify reproducible release
        run: python3 scripts/build_release.py --check-reproducibility

  runtime-lifecycle:
    name: Runtime lifecycle (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - windows-2025

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: workspace-template/requirements.txt

      - name: Install runtime test dependencies
        run: |
          python -m pip install --disable-pip-version-check "pytest>=8,<10"
          python -m pip install --disable-pip-version-check -r workspace-template/requirements.txt

      - name: Test clean install, Git lifecycle, HTML and DOCX
        run: python -m pytest tests/test_workspace_lifecycle.py tools/verifiable_document/tests/test_builder.py

  cross-platform:
    name: Cross-platform lifecycle
    needs:
      - runtime-lifecycle
    runs-on: ubuntu-24.04
    steps:
      - name: Confirm matrix result
        run: echo "Linux, macOS, and Windows lifecycle gates passed."

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
