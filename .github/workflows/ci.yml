name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Python 3.11 quality gates
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tools/verifiable_document/requirements.txt

      - name: Install test dependencies
        run: |
          python -m pip install --disable-pip-version-check "PyYAML>=6.0.2,<7" "ruff>=0.11,<1" pytest
          python -m pip install --disable-pip-version-check -r tools/verifiable_document/requirements.txt

      - name: Set reproducible timestamp
        run: echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)" >> "$GITHUB_ENV"

      - name: Lint
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

      - name: Validate public upstream
        run: python3 scripts/validate_workspace.py --mode upstream

      - name: Scan public repository
        run: python3 scripts/check_repo_safety.py --profile upstream-public

      - name: Run workspace unit tests
        run: python3 -m unittest discover -s tests -v

      - name: Run document-tool unit tests
        run: python3 -m unittest discover -s tools/verifiable_document/tests -v

      - name: Run pytest
        run: python3 -m pytest

      - name: Build release workspace
        run: python3 scripts/build_release.py --version 1.0.0-beta.1

      - name: Verify reproducible release
        run: python3 scripts/build_release.py --version 1.0.0-beta.1 --check-reproducibility
