name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release tag
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out exact tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: workspace-template/requirements.txt

      - name: Validate version tag
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Not a supported version tag: $GITHUB_REF_NAME" >&2
            exit 1
          fi

      - name: Install test dependencies
        run: |
          python -m pip install --disable-pip-version-check "ruff>=0.11,<1" "pytest>=8,<10"
          python -m pip install --disable-pip-version-check -r workspace-template/requirements.txt

      - name: Set reproducible timestamp
        run: echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)" >> "$GITHUB_ENV"

      - name: Repeat all quality gates
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          ruff check .
          ruff format --check .
          python3 scripts/validate_workspace.py --mode upstream
          python3 scripts/check_repo_safety.py --profile upstream-public
          python3 -m unittest discover -s tests -v
          python3 -m unittest discover -s tools/verifiable_document/tests -v
          python3 -m pytest
          python3 scripts/build_release.py --version "$version"
          python3 scripts/build_release.py --version "$version" --check-reproducibility

  runtime-lifecycle:
    name: Release runtime lifecycle (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - windows-2025

    steps:
      - name: Check out exact tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: workspace-template/requirements.txt

      - name: Install runtime test dependencies
        run: |
          python -m pip install --disable-pip-version-check "pytest>=8,<10"
          python -m pip install --disable-pip-version-check -r workspace-template/requirements.txt

      - name: Test clean install, Git lifecycle, HTML and DOCX
        run: python -m pytest tests/test_workspace_lifecycle.py tools/verifiable_document/tests/test_builder.py

  release:
    name: Publish one GitHub release
    needs:
      - verify
      - runtime-lifecycle
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      artifact-metadata: write
      attestations: write
      contents: write
      id-token: write

    steps:
      - name: Check out exact tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: workspace-template/requirements.txt

      - name: Install test dependencies
        run: |
          python -m pip install --disable-pip-version-check "ruff>=0.11,<1" "pytest>=8,<10"
          python -m pip install --disable-pip-version-check -r workspace-template/requirements.txt

      - name: Set reproducible timestamp
        run: echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)" >> "$GITHUB_ENV"

      - name: Re-run gates and build fresh assets
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          ruff check .
          ruff format --check .
          python3 scripts/validate_workspace.py --mode upstream
          python3 scripts/check_repo_safety.py --profile upstream-public
          python3 -m unittest discover -s tests -v
          python3 -m unittest discover -s tools/verifiable_document/tests -v
          python3 -m pytest
          python3 scripts/build_release.py --version "$version" --check-reproducibility

      - name: Attest release ZIP and SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            dist/*.zip
            dist/*.spdx.json

      - name: Publish verified assets from a draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          version="${tag#v}"
          zip="dist/minius_codex_lab-workspace-v${version}.zip"
          checksum="${zip}.sha256"
          sbom="dist/minius_codex_lab-workspace-v${version}.spdx.json"
          notes="docs/releases/${tag}.md"

          test -f "$zip"
          test -f "$checksum"
          test -f "$sbom"
          test -f "$notes"

          prerelease_args=(--prerelease=false)
          expected_prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease_args=(--prerelease=true)
            expected_prerelease=true
          fi

          expected_title="minius_codex_lab $version"
          expected_zip="$(basename "$zip")"
          expected_checksum="$(basename "$checksum")"
          expected_sbom="$(basename "$sbom")"
          expected_assets="$(printf '%s\n%s\n%s\n' "$expected_zip" "$expected_checksum" "$expected_sbom" | LC_ALL=C sort)"

          verify_release() {
            expected_draft="$1"
            test "$(gh release view "$tag" --json isDraft --jq .isDraft)" = "$expected_draft"
            test "$(gh release view "$tag" --json isPrerelease --jq .isPrerelease)" = "$expected_prerelease"
            test "$(gh release view "$tag" --json name --jq .name)" = "$expected_title"
            test "$(gh release view "$tag" --json body --jq .body)" = "$(<"$notes")"
            actual_assets="$(gh release view "$tag" --json assets --jq '.assets[].name' | LC_ALL=C sort)"
            test "$actual_assets" = "$expected_assets"

            download_dir="$(mktemp -d)"
            gh release download "$tag" --dir "$download_dir" --pattern "$expected_zip" --pattern "$expected_checksum" --pattern "$expected_sbom"
            cmp "$zip" "$download_dir/$expected_zip"
            cmp "$checksum" "$download_dir/$expected_checksum"
            cmp "$sbom" "$download_dir/$expected_sbom"
          }

          if gh release view "$tag" >/dev/null 2>&1; then
            if [[ "$(gh release view "$tag" --json isDraft --jq .isDraft)" != true ]]; then
              verify_release false
              exit 0
            fi
            gh release edit "$tag" --draft=true --title "$expected_title" --notes-file "$notes" "${prerelease_args[@]}"
            while IFS= read -r asset; do
              if [[ "$asset" != "$expected_zip" && "$asset" != "$expected_checksum" && "$asset" != "$expected_sbom" ]]; then
                gh release delete-asset "$tag" "$asset" --yes
              fi
            done < <(gh release view "$tag" --json assets --jq '.assets[].name')
            gh release upload "$tag" "$zip" "$checksum" "$sbom" --clobber
          else
            gh release create "$tag" "$zip" "$checksum" "$sbom" --verify-tag --draft=true --title "$expected_title" --notes-file "$notes" "${prerelease_args[@]}"
          fi

          verify_release true
          gh release edit "$tag" --draft=false --title "$expected_title" --notes-file "$notes" "${prerelease_args[@]}"
          verify_release false
